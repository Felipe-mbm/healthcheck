services:
  # BACKEND (Opcional, pois você vai rodar na IDE)
  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: healthcheck-backend
    ports:
      - "8080:8080"
    environment:
      # Configuração interna da rede do Docker
      - DATABASE_URL=jdbc:postgresql://postgres:5432/healthcheck_db
      - DATABASE_USERNAME=admin
      - DATABASE_PASSWORD=admin
      - JWT_SECRET=segredo_docker_prod
      - ID_GOOGLE=628891440062-0qu4upbmn7hgs1du1g23d8j9nhd11lk1.apps.googleusercontent.com
    depends_on:
      postgres:
        condition: service_healthy

  # BANCO DE DADOS
  postgres:
    image: postgres:15-alpine
    container_name: healthcheck-db
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=healthcheck_db
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=admin
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d healthcheck_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres-data: