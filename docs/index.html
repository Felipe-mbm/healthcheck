<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="origin">
    <title>Google SSO Test Client</title>
    <style>
        body { font-family: monospace; max-width: 800px; margin: 2rem auto; padding: 0 1rem; }
        .section { margin-bottom: 2rem; padding: 1rem; border: 1px solid #ccc; }
        textarea { width: 100%; height: 150px; font-family: monospace; margin-top: 0.5rem; }
        button { padding: 10px 20px; cursor: pointer; }
        label { font-weight: bold; display: block; }
    </style>
</head>
<body>

<h1>HealthCheck API - Teste de Autenticação</h1>

<div id="g_id_onload"
     data-client_id="${ID_GOOGLE}"
     data-callback="handleCredentialResponse"
     data-auto_prompt="false">
</div>

<div class="section">
    <h3>Fazer Login</h3>
    <div class="g_id_signin"
         data-type="standard"
         data-size="large"
         data-theme="outline"
         data-text="sign_in_with"
         data-shape="rectangular"
         data-logo_alignment="left">
    </div>
</div>

<div class="section">
    <h3>ID Token</h3>
    <label for="token_output">Token JWT (Google):</label>
    <textarea id="token_output" readonly placeholder="O token aparecerá aqui após o login..."></textarea>
    <br>
    <button onclick="copyToClipboard()">Copiar Token</button>
    <span id="copy_status"></span>
</div>

<script src="https://accounts.google.com/gsi/client" async defer></script>

<script>
    function handleCredentialResponse(response) {
        const idToken = response.credential;
        const outputField = document.getElementById("token_output");
        outputField.value = idToken;
        console.log("Login realizado. Token recebido.");
    }

    function copyToClipboard() {
        const copyText = document.getElementById("token_output");
        if (!copyText.value) {
            alert("Faça login primeiro!");
            return;
        }
        copyText.select();
        copyText.setSelectionRange(0, 99999);
        navigator.clipboard.writeText(copyText.value).then(() => {
            document.getElementById("copy_status").innerText = "Copiado!";
            setTimeout(() => document.getElementById("copy_status").innerText = "", 2000);
        });
    }
</script>
</body>
</html>
