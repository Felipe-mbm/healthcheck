spring.application.name=health-check

# --- BANCO DE DADOS (Hibrido) ---
# Logica: Usa a env do Docker SE existir, SENAO usa o localhost
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/healthcheck_db}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:admin}

# --- JPA ---
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# --- FLYWAY ---
spring.flyway.enabled=true
spring.flyway.locations=${DATABASE_LOCATION:classpath:db/migration}
spring.flyway.baseline-on-migrate=true

# --- SEGURANCA ---
api.security.token.secret=${JWT_SECRET:segredo_padrao_local_dev_123456}
api.security.google.client-id=${ID_GOOGLE:google_id_fake_local}

# --- GERAL ---
app.scheduler.interval=60000
app.http.timeout=15
spring.threads.virtual.enabled=true